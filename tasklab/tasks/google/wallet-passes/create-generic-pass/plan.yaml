decision:
  service: "google-wallet-passes"
  chosen_surfaces:
    - step: "issuer + gcp enablement"
      surface: "hitl_web"
      reason: "Account/permissions and console UI are trust-boundary steps."
    - step: "class/object create + verify"
      surface: "rest_api"
      reason: "Deterministic and versioned; easiest to smoke-test with curl."
    - step: "save url generation"
      surface: "local_script"
      reason: "JWT signing requires local key material; scripts reduce errors."

steps:
  - "Review references; update research.md + references/checked-surfaces.yaml (verified_on + versions)."
  - "Copy inputs.example.yaml -> inputs.yaml (local only; no secrets)."
  - "Run outputs/scripts/00-check-surfaces.sh (decide CLI-first vs HITL fallback)."
  - "If gcloud is available: run outputs/scripts/10-gcloud-bootstrap.sh (best-effort automation)."
  - "HITL: hitl/enable-api-and-issuer.step.yaml"
  - "HITL: hitl/create-service-account.step.yaml"
  - "HITL: hitl/authorize-service-account.step.yaml"
  - "Optional: Run outputs/scripts/00-hitl-portal.sh to generate a clickable HITL portal page."
  - "Run outputs/scripts/00-hitl-links.sh (prints links + what TaskLab cannot automate)."
  - "Run outputs/scripts/00-init-project-env.sh (creates/fills project `.env`, copy-safe)."
  - "Run outputs/scripts/01-preflight.sh"
  - "Run outputs/scripts/02-get-access-token.sh"
  - "Run outputs/scripts/02b-smoke-wallet-api.sh (verify issuer access via REST)."
  - "Run outputs/scripts/03-create-class.sh"
  - "Run outputs/scripts/04-create-object.sh"
  - "Run outputs/scripts/05-generate-save-url.sh"
  - "Acceptance test: open the printed save URL and confirm the pass is added."
  - "Update outputs/reports/setup-report.md with evidence (no secrets)."
