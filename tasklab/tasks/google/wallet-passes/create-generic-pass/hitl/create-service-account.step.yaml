type: hitl_web_step
id: create_service_account
title: Create a service account + JSON key for Wallet Objects API calls

target:
  service: google-wallet-passes
  entry_url: https://console.cloud.google.com/

doc_check:
  docs:
    - label: REST API auth credentials (Generic pass)
      url: https://developers.google.com/wallet/generic/getting-started/auth/rest
    - label: Google Cloud IAM service accounts docs
      url: https://cloud.google.com/iam/docs/service-accounts

ui_expectation:
  page_name: Service accounts
  expected_labels:
    - IAM & Admin
    - Service Accounts
    - Create Service Account
    - Keys
    - JSON

actions:
  - kind: note
    label: CLI-first option (recommended)
    locator_hint: Your terminal
    text: "If you have `gcloud`, prefer automation: `outputs/scripts/10-gcloud-bootstrap.sh` creates the service account and key. Use this HITL flow only if the CLI path is unavailable or blocked."
  - kind: navigate
    label: Open service accounts page
    url: https://console.cloud.google.com/iam-admin/serviceaccounts
  - kind: click
    label: Create service account
    locator_hint: "Create service account" button
  - kind: note
    label: Skip optional IAM role grants (per docs)
    locator_hint: Stepper during service account creation
    text: "Follow the official Google Wallet REST auth doc: create the service account and click 'DONE' without granting extra project roles unless your org requires it for other reasons. Wallet Objects API authorization is handled by adding the service account email as a 'Developer' in the Google Pay & Wallet console."
  - kind: copy
    label: Copy the service account email address
    locator_hint: Service account details (email shown after creation)
  - kind: click
    label: Create key (JSON)
    locator_hint: Service account → Keys → Add key → Create new key → JSON
  - kind: copy
    label: Save the JSON key file path locally
    locator_hint: Your downloads folder / chosen secure location
  - kind: note
    label: Persist key path
    locator_hint: Your project `.env` file
    text: "Set `GOOGLE_APPLICATION_CREDENTIALS=/abs/path/to/key.json` in your project `.env` (gitignored). Never commit the key file."

verify:
  - kind: checkbox_confirmation
    label: JSON key downloaded; service account email recorded

fallback:
  - kind: note
    label: If key creation is restricted
    text: "Record the org policy restriction and the approved alternative (Workload Identity, keyless auth, etc.) in the report."
