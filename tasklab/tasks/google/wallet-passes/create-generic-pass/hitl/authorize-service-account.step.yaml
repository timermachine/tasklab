type: hitl_web_step
id: authorize_service_account_in_wallet_console
title: Authorize the service account in Google Pay & Wallet console (Users → Developer)

target:
  service: google-wallet-passes
  entry_url: https://pay.google.com/business/console/

doc_check:
  docs:
    - label: REST API auth credentials (Generic pass)
      url: https://developers.google.com/wallet/generic/getting-started/auth/rest

ui_expectation:
  page_name: Google Pay & Wallet console
  expected_labels:
    - Google Wallet API
    - Users
    - Invite a user
    - Access level
    - Developer

actions:
  - kind: navigate
    label: Open Google Pay & Wallet console
    url: https://pay.google.com/business/console/
  - kind: note
    label: Pick the correct issuer account
    locator_hint: Account / business profile picker (varies)
    text: "If you have multiple businesses/issuer accounts, select the one that matches your intended ISSUER_ID for this project."
  - kind: note
    label: Get the service account email
    locator_hint: Google Cloud Console or the downloaded JSON key file
    text: "Use the service account email you created in the previous HITL step. If you only have the JSON key file, its `client_email` field is the service account email to invite."
  - kind: click
    label: Open Users
    locator_hint: Left nav → Users
  - kind: click
    label: Invite a user
    locator_hint: '"Invite a user" button'
  - kind: note
    label: Invite the service account as Developer
    locator_hint: Invite form
    text: "Paste the service account email, set Access level = Developer, then send the invite."

verify:
  - kind: checkbox_confirmation
    label: Service account email appears under Users with Developer access

fallback:
  - kind: note
    label: If Users menu is missing
    text: "Console UI can vary by account. Use console search (top bar) for 'Users' and record the exact navigation path/labels you used in the setup report."
