decision:
  service: "supabase"
  chosen_surfaces:
    - step: "local bootstrap"
      surface: "cli"
      reason: "Best fit for local auth, linking, and type generation."
    - step: "dashboard auth URL configuration"
      surface: "hitl_web"
      reason: "Low volume, trust-boundary style configuration, easier to verify with operator."
    - step: "optional social provider configuration"
      surface: "hitl_web"
      reason: "Provider secrets and dashboard configuration are clearer with guided HITL."
    - step: "future project inspection or controlled agent support"
      surface: "mcp_optional"
      reason: "Useful for development-time inspection or agent workflows, not required for baseline task."

steps:
  - "Review references; update research.md + checked-surfaces.yaml (verified_on + versions)."
  - "Copy inputs.example.yaml -> inputs.yaml (local only; no secrets)."
  - "Install scaffold into your project (outputs/scripts/00-install-scaffold.sh with --project-root and --template)."
  - "Create repo-local .env in your project root (copy outputs/env/.env.example to .env; gitignore it)."
  - "HITL: hitl/collect-project-values.step.yaml (fill your project-root .env; copy-safe)."
  - "Run outputs/scripts/01-check-cli.sh"
  - "Run outputs/scripts/02-login.sh"
  - "Run outputs/scripts/03-link-project.sh pointing at your project root (reads SUPABASE_PROJECT_REF from .env)."
  - "HITL: hitl/configure-auth-urls.step.yaml"
  - "HITL (optional): hitl/enable-google.step.yaml"
  - "Run outputs/scripts/04-generate-types.sh for your project root (auto-picks output path)."
  - "Run outputs/scripts/99-run-tests.sh for your project root (pass --template if verifying scaffold install)."
  - "Update outputs/reports/setup-report.md (record file paths + verification commands, not secret values)."
