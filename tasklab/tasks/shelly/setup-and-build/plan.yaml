decision:
  service: "shelly"
  chosen_surfaces:
    - step: "USB debugging setup"
      surface: "hitl_web"
      reason: "Device settings cannot be automated — operator must tap Build Number and toggle manually."
    - step: "dependency install"
      surface: "local_script"
      reason: "pnpm install is fully scriptable."
    - step: "local build"
      surface: "local_script"
      reason: "pnpm android runs Expo + Gradle and installs via adb automatically."
    - step: "release APK fallback"
      surface: "local_script + cli"
      reason: "gh release download + adb install is fully scriptable when gh CLI is available."
    - step: "API key configuration"
      surface: "hitl_web"
      reason: "Keys are entered in-app (Shelly Settings). No CLI or file-based path exists."

steps:
  - "Run outputs/scripts/00-hitl-links.sh --project-root <project-root> (prints links, writes /tmp helper scripts)."
  - "Complete hitl/enable-usb-debugging.step.yaml — enable USB debugging on Android device."
  - "Clone Shelly if not already present: git clone https://github.com/RYOITABASHI/Shelly <project-root>"
  - "Run outputs/scripts/01-preflight.sh --project-root <project-root> [--build-path local|release]."
  - "Local build path: run outputs/scripts/02-install-deps.sh then 03-build-and-install.sh."
  - "Release APK path (fallback): run outputs/scripts/04-download-and-install.sh."
  - "Run outputs/scripts/99-run-tests.sh --project-root <project-root>."
  - "Complete hitl/configure-api-keys.step.yaml — add Claude/Gemini key in Shelly Settings."
  - "Fill outputs/reports/setup-report.md with evidence."
  - "Update manifest.yaml: set maturity 0→1, append run entry."
  - "Regenerate registry: ./scripts/build-registry.sh from TaskLab root."
