type: hitl_web_step
id: collect_api_keys
title: Collect Stripe publishable + secret API keys (test mode)

account_required:
  service: Stripe
  signup_url: https://dashboard.stripe.com/register
  note: "Free account. No credit card required for test mode."

target:
  service: stripe
  entry_url: https://dashboard.stripe.com/test/apikeys

doc_check:
  docs:
    - label: API keys
      url: https://docs.stripe.com/keys

ui_expectation:
  page_name: Developers / API keys
  expected_labels:
    - Developers
    - API keys
    - Publishable key
    - Secret key

actions:
  - kind: navigate
    label: Open Stripe Dashboard
    url: https://dashboard.stripe.com/test/apikeys
  - kind: note
    label: Switch to test mode
    locator_hint: Mode toggle (test vs live)
    text: "Enable test mode before copying keys so you get `pk_test_...` and `sk_test_...`."
  - kind: click
    label: Open Developers
    locator_hint: Left nav "Developers"
  - kind: click
    label: Open API keys
    locator_hint: "API keys"
  - kind: copy
    label: Copy Publishable key (pk_test_...)
    locator_hint: "Publishable key"
  - kind: copy
    label: Copy Secret key (sk_test_...)
    locator_hint: "Secret key" (treat as sensitive)
  - kind: note
    label: Persist values (copy once)
    locator_hint: Your local project root
    text: "Paste into your project `.env` (gitignored): STRIPE_PUBLISHABLE_KEY= and STRIPE_SECRET_KEY=."

clipboard:
  - label: Publishable key
    value_from: stripe_publishable_key
  - label: Secret key
    value_from: stripe_secret_key
    sensitive: true

verify:
  - kind: checkbox_confirmation
    label: "Keys recorded in project `.env` (gitignored) and evidence recorded in `outputs/reports/setup-report.md`"

