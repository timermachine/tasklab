# Minimal Supabase CLI config for an Edge Functions-only repo.
#
# This sample is meant to exercise TaskLab’s Supabase setup task.

project_id = "tasklab-supabase-edge-sample"

[api]
enabled = true
port = 64321

[db]
port = 64322
shadow_port = 64320

[studio]
enabled = true
port = 64323
api_url = "http://127.0.0.1"

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[edge_runtime]
enabled = true
policy = "per_worker"
deno_version = 2

[functions.health]
enabled = true
verify_jwt = true
import_map = "./functions/health/deno.json"
entrypoint = "./functions/health/index.ts"

